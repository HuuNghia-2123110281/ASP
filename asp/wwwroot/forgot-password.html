<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --dark: #5a5c69;
            --bg: #f8f9fc;
            --success: #1cc88a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

            .card h2 {
                color: var(--dark);
                margin-top: 0;
                margin-bottom: 10px;
            }

            .card p {
                color: #858796;
                font-size: 14px;
                margin-bottom: 25px;
                line-height: 1.5;
            }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

            .input-group i {
                position: absolute;
                left: 15px;
                top: 14px;
                color: #b7b9cc;
            }

            .input-group input {
                width: 100%;
                padding: 12px 15px 12px 40px;
                border: 1px solid #d1d3e2;
                border-radius: 8px;
                font-size: 14px;
                outline: none;
                box-sizing: border-box;
                transition: 0.3s;
            }

                .input-group input:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
                }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

            .btn-main:hover {
                background: #2e59d9;
            }

            .btn-main:disabled {
                background: #b7b9cc;
                cursor: not-allowed;
            }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

            .links a:hover {
                text-decoration: underline;
            }

        #otpCode {
            letter-spacing: 5px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="card" id="step1">
        <h2><i class="fas fa-envelope" style="color:var(--primary)"></i> Khôi phục mật khẩu</h2>
        <p>Nhập địa chỉ Email của bạn để nhận mã xác thực (OTP) 6 số.</p>

        <div class="input-group">
            <i class="fas fa-at"></i>
            <input type="email" id="email" placeholder="Nhập địa chỉ Email...">
        </div>
        <button class="btn-main" id="btnStep1" onclick="sendOtp()">NHẬN MÃ OTP</button>
        <div class="links" style="margin-top: 25px;"><a href="login.html"><i class="fas fa-arrow-left"></i> Quay lại Đăng nhập</a></div>
    </div>

    <div class="card" id="step2" style="display: none;">
        <h2><i class="fas fa-unlock-alt" style="color:var(--success)"></i> Tạo mật khẩu mới</h2>
        <p id="otpMessage" style="color:var(--success); font-weight:bold;">Mã OTP đã được gửi đến Email của bạn!</p>

        <div class="input-group">
            <input type="text" id="otpCode" placeholder="Nhập mã OTP 6 số" maxlength="6">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới...">
        </div>
        <button class="btn-main" id="btnStep2" style="background:var(--success);" onclick="verifyAndReset()">XÁC NHẬN ĐỔI MẬT KHẨU</button>
        <div class="links" style="margin-top: 25px;"><a href="#" onclick="location.reload()">Gửi lại mã OTP khác</a></div>
    </div>

    <script>
        let savedEmail = "";

        async function sendOtp() {
            const emailInput = document.getElementById("email").value.trim();
            if (!emailInput) return alert("Vui lòng nhập Email!");

            const btn = document.getElementById("btnStep1");
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi mã...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/Auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: emailInput })
                });

                const data = await res.json();

                if (res.ok) {
                    savedEmail = emailInput;
                    document.getElementById("step1").style.display = "none";
                    document.getElementById("step2").style.display = "block";
                } else {
                    alert(data.message);
                    btn.innerHTML = 'NHẬN MÃ OTP';
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Lỗi mạng!");
                btn.innerHTML = 'NHẬN MÃ OTP';
                btn.disabled = false;
            }
        }

        async function verifyAndReset() {
            const otpCode = document.getElementById("otpCode").value.trim();
            const newPassword = document.getElementById("newPassword").value.trim();

            if (!otpCode || otpCode.length !== 6) return alert("Vui lòng nhập đủ 6 số OTP!");
            if (!newPassword) return alert("Vui lòng nhập mật khẩu mới!");

            const btn = document.getElementById("btnStep2");
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xác thực...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/Auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: savedEmail,
                        otp: otpCode,
                        newPassword: newPassword
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(" " + data.message);
                    window.location.href = "login.html";
                } else {
                    alert(" Lỗi: " + data.message);
                    btn.innerHTML = 'XÁC NHẬN ĐỔI MẬT KHẨU';
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Lỗi mạng!");
                btn.innerHTML = 'XÁC NHẬN ĐỔI MẬT KHẨU';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
