<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch hẹn xem nhà - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .container-fluid {
            padding: 25px;
        }

        .page-title {
            margin-top: 0;
            color: var(--dark);
            font-size: 28px;
            margin-bottom: 20px;
        }

        .table-box {
            background: white;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e3e6f0;
            font-size: 14px;
        }

        th {
            background: #f8f9fc;
            color: var(--dark);
            font-weight: bold;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

            .status.dang-cho {
                background: #f6c23e;
                color: white;
            }

            .status.da-xem {
                background: #36b9cc;
                color: white;
            }

            .status.da-chot {
                background: #1cc88a;
                color: white;
            }

            .status.da-huy {
                background: #e74a3b;
                color: white;
            }

        .action-btn {
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: white;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>
            <div class="divider"></div>
            <div class="nav-heading">Quản trị Nguồn hàng</div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>
            <div class="divider"></div>
            <div class="nav-heading">Nghiệp vụ Sales</div>
            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item active"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
            <a href="manage-news.html" class="nav-item active"><i class="fas fa-fw fa-newspaper"></i> Quản lý Tin tức</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <button onclick="localStorage.clear(); window.location.href='login.html'" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <h1 class="page-title">Quản lý Lịch hẹn</h1>
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>Khách hàng</th>
                            <th>Bất động sản</th>
                            <th>Thời gian hẹn</th>
                            <th>Trạng thái (DB)</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="appointment-list"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let customers = []; let properties = [];
        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("adminName").innerText = localStorage.getItem("username") || "Sales";
            const [resC, resP] = await Promise.all([fetch('/api/Customer'), fetch('/api/BatDongSan')]);
            customers = await resC.json(); properties = await resP.json();
            loadAppointments();
        });

        function loadAppointments() {
            fetch('/api/Appointment').then(res => res.json()).then(data => {
                let html = '';
                if (data.length === 0) html = '<tr><td colspan="5" style="text-align:center;">Chưa có lịch hẹn</td></tr>';
                data.forEach(a => {
                    const c = customers.find(x => x.id === a.customerId) || { name: a.customerId, phone: 'Thành viên Web' };
                    const p = properties.find(x => x.id === a.propertyId) || { tieuDe: 'BĐS đã xóa' };

                    // Xử lý trạng thái chuẩn
                    let stClass = "dang-cho"; let stText = "Đợi duyệt";
                    if (a.status.includes("xem")) { stClass = "da-xem"; stText = "Đã xem"; }
                    if (a.status.includes("hủy") || a.status.includes("Cancel")) { stClass = "da-huy"; stText = "Đã hủy"; }
                    if (a.status.includes("chốt") || a.status.includes("hoàn tất")) { stClass = "da-chot"; stText = "Đã chốt"; }

                    const d = new Date(a.appointmentDate).toLocaleString('vi-VN');
                    html += `<tr>
                            <td><strong>${c.name}</strong><br><small style="color:#858796">${c.phone}</small></td>
                            <td style="color:var(--primary); font-weight:bold;">${p.tieuDe}</td>
                            <td><i class="far fa-clock"></i> ${d}</td>
                            <td><span class="status ${stClass}">${stText}</span></td>
                            <td>
                                ${stClass === 'dang-cho' ? `
                                <button class="action-btn" style="background:var(--info)" onclick="updateStatus('${a.id}', 'Đã xem nhà')"><i class="fas fa-eye"></i> Đã xem</button>
                                <button class="action-btn" style="background:var(--danger)" onclick="updateStatus('${a.id}', 'Đã hủy')"><i class="fas fa-times"></i> Hủy</button>
                                ` : `<button class="action-btn" style="background:var(--success)" onclick="updateStatus('${a.id}', 'Đã chốt')"><i class="fas fa-check"></i> Đã chốt</button>`}
                            </td>
                        </tr>`;
                });
                document.getElementById('appointment-list').innerHTML = html;
            });
        }

        async function updateStatus(id, st) {
            if (confirm(`Xác nhận: ${st}?`)) {
                await fetch(`/api/Appointment/${id}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(st) });
                loadAppointments();
            }
        }
    </script>
</body>
</html>
