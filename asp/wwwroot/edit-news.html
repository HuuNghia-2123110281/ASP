<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa Tin tức - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
            --success: #1cc88a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            border-top: 5px solid var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-weight: bold;
                margin-bottom: 8px;
                color: var(--dark);
            }

            .form-group input, .form-group textarea {
                width: 100%;
                padding: 12px;
                border: 1px solid #d1d3e2;
                border-radius: 8px;
                outline: none;
                box-sizing: border-box;
            }

        .btn-save {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

            .btn-save:hover {
                background: #17a673;
            }

        #imgPreview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; margin-top:0;"><i class="fas fa-edit"></i> SỬA BÀI VIẾT</h2>

        <div class="form-group">
            <label>Tiêu đề bài viết</label>
            <input type="text" id="editTitle">
        </div>

        <div class="form-group">
            <label>Nội dung bài viết</label>
            <textarea id="editDesc" rows="6"></textarea>
        </div>

        <div class="form-group">
            <label>Hình ảnh bài viết</label>
            <img id="imgPreview" src="">
            <input type="file" id="editFile" accept="image/*" style="margin-top:10px;" onchange="previewImage(this)">
        </div>

        <button class="btn-save" onclick="updateNews()">LƯU THAY ĐỔI</button>
        <p id="msg" style="text-align:center; font-weight:bold; margin-top:15px;"></p>
        <div style="text-align:center; margin-top:10px;"><a href="manage-news.html" style="color:var(--dark); text-decoration:none;"><i class="fas fa-arrow-left"></i> Quay lại danh sách</a></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');
        let currentImgBase64 = "";

        // 1. Tải dữ liệu cũ
        document.addEventListener("DOMContentLoaded", async () => {
            const res = await fetch('/api/News');
            const list = await res.json();
            const news = list.find(n => n.id === newsId);

            if (news) {
                document.getElementById('editTitle').value = news.title;
                document.getElementById('editDesc').value = news.description;
                document.getElementById('imgPreview').src = news.imageUrl;
                currentImgBase64 = news.imageUrl;
            }
        });

        // 2. Xem trước ảnh mới
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImgBase64 = e.target.result;
                    document.getElementById('imgPreview').src = currentImgBase64;
                };
                reader.readAsDataURL(file);
            }
        }

        // 3. Gửi cập nhật lên C#
        async function updateNews() {
            const msg = document.getElementById('msg');
            const data = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDesc').value,
                imageUrl: currentImgBase64,
                author: localStorage.getItem('username') || "Admin"
            };

            msg.innerText = "Đang lưu...";
            const res = await fetch(`/api/News/${newsId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                msg.style.color = "green"; msg.innerText = "Cập nhật thành công!";
                setTimeout(() => window.location.href = 'manage-news.html', 1000);
            } else {
                msg.style.color = "red"; msg.innerText = "Lỗi khi lưu!";
            }
        }
    </script>
</body>
</html>
