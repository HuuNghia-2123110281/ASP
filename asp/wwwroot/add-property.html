<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng tin BĐS - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --dark: #202124;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        header {
            background: white;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            text-transform: uppercase;
        }

        .form-container {
            max-width: 850px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

            .form-container h2 {
                text-align: center;
                color: var(--dark);
                margin-bottom: 30px;
            }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 8px;
                color: #333;
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 16px;
                box-sizing: border-box;
                outline: none;
                transition: 0.3s;
            }

                .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 5px rgba(26, 115, 232, 0.3);
                }

        .dynamic-select {
            border-left: 4px solid #ffc107 !important;
            background-color: #fafafa;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        .upload-zone {
            border: 2px dashed #1a73e8;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            background: #f8fbff;
            cursor: pointer;
            transition: 0.3s;
        }

            .upload-zone:hover {
                background: #edf4ff;
                border-color: #1557b0;
            }

        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .preview-item {
            position: relative;
            height: 100px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

            .preview-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .remove-img {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

            .submit-btn:hover {
                background: #218838;
            }

        #message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><i class="fas fa-home"></i> BĐS NGHĨA - SALES PANEL</a>
        <div style="display: flex; gap: 20px;">
            <a href="manage-system.html" id="linkConfig" style="display:none; color: var(--dark); text-decoration: none; font-weight: bold;"><i class="fas fa-cogs"></i> Cấu hình</a>
            <a href="index.html" style="color: var(--dark); text-decoration: none; font-weight: bold;"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
        </div>
    </header>

    <div class="form-container">
        <h2><i class="fas fa-edit"></i> ĐĂNG TIN NHÀ ĐẤT & ALBUM ẢNH</h2>

        <div class="form-group">
            <label>Tiêu đề bài đăng <span style="color:red">*</span></label>
            <input type="text" id="tieuDe" placeholder="VD: Bán biệt thự biển Phú Quốc...">
        </div>

        <div class="row">
            <div class="col form-group">
                <label>Loại hình BĐS <span style="color:red">*</span></label>
                <select id="loaiHinh" class="dynamic-select"><option value="">-- Đang tải --</option></select>
            </div>
            <div class="col form-group">
                <label>Mức giá (VNĐ) <span style="color:red">*</span></label>
                <input type="number" id="gia">
            </div>
        </div>

        <div class="row">
            <div class="col form-group">
                <label>Thuộc Dự án</label>
                <select id="duAn" class="dynamic-select"><option value="">-- Nhà lẻ --</option></select>
            </div>
            <div class="col form-group">
                <label>Chủ nhà ký gửi <span style="color:red">*</span></label>
                <select id="chuNha" class="dynamic-select"><option value="">-- Chọn chủ nhà --</option></select>
            </div>
        </div>

        <div class="row">
            <div class="col form-group">
                <label>Diện tích (m²)</label>
                <input type="number" id="dienTich">
            </div>
            <div class="col form-group">
                <label>Số phòng ngủ</label>
                <input type="number" id="phongNgu">
            </div>
        </div>

        <div class="form-group">
            <label>Địa chỉ chi tiết <span style="color:red">*</span></label>
            <input type="text" id="diaChi">
        </div>

        <div class="form-group">
            <label>Mô tả bài viết</label>
            <textarea id="moTa" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>Album hình ảnh (Tấm đầu tiên là ảnh đại diện) <span style="color:red">*</span></label>
            <div class="upload-zone" onclick="document.getElementById('multiImages').click()">
                <i class="fas fa-images" style="font-size: 40px; color: #1a73e8; margin-bottom: 10px;"></i>
                <p style="margin:0; font-weight:bold;">Bấm vào đây để chọn nhiều ảnh cho album</p>
                <input type="file" id="multiImages" multiple accept="image/*" style="display:none;" onchange="previewImages(this.files)">
            </div>
            <div id="previewContainer" class="preview-container"></div>
        </div>

        <button class="submit-btn" onclick="submitProperty()"><i class="fas fa-cloud-upload-alt"></i> XUẤT BẢN TIN ĐĂNG</button>
        <p id="message"></p>
    </div>

    <script>
        let selectedFiles = [];

        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("role");
            if (role !== "Admin" && role !== "Sales") {
                window.location.href = "index.html"; return;
            }
            if (role === "Admin") document.getElementById("linkConfig").style.display = "inline-block";
            loadMasterData();
        });

        async function loadMasterData() {
            fetch('/api/Category').then(res => res.json()).then(data => {
                let html = '<option value="">-- Chọn Loại hình --</option>';
                data.forEach(c => html += `<option value="${c.name}">${c.name}</option>`);
                document.getElementById('loaiHinh').innerHTML = html;
            });
            fetch('/api/Project').then(res => res.json()).then(data => {
                let html = '<option value="">-- Nhà lẻ --</option>';
                data.forEach(p => html += `<option value="${p.id}">${p.name}</option>`);
                document.getElementById('duAn').innerHTML = html;
            });
            fetch('/api/Owner').then(res => res.json()).then(data => {
                let html = '<option value="">-- Chọn Chủ nhà --</option>';
                data.forEach(o => html += `<option value="${o.id}">${o.fullName}</option>`);
                document.getElementById('chuNha').innerHTML = html;
            });
        }

        function previewImages(files) {
            for (let file of files) {
                selectedFiles.push(file);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `
                            <img src="${e.target.result}">
                            <button class="remove-img" onclick="removeImage(${selectedFiles.length - 1}, this)">×</button>
                        `;
                    document.getElementById('previewContainer').appendChild(div);
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage(index, btn) {
            selectedFiles.splice(index, 1);
            btn.parentElement.remove();
        }

        async function submitProperty() {
            const btn = document.querySelector('.submit-btn');
            const msg = document.getElementById('message');

            if (selectedFiles.length === 0) {
                msg.style.color = "red"; msg.innerText = "Vui lòng chọn ít nhất 1 tấm ảnh!"; return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xuất bản...';
            btn.disabled = true;


            const formData = new FormData();
            formData.append("TieuDe", document.getElementById('tieuDe').value);
            formData.append("LoaiHinh", document.getElementById('loaiHinh').value);
            formData.append("Gia", document.getElementById('gia').value);
            formData.append("DiaChi", document.getElementById('diaChi').value);
            formData.append("ProjectId", document.getElementById('duAn').value);
            formData.append("OwnerId", document.getElementById('chuNha').value);
            formData.append("HinhAnhFile", selectedFiles[0]);

            try {
                const response = await fetch('/api/BatDongSan', { method: 'POST', body: formData });
                const bds = await response.json();

                if (response.ok) {
                    msg.style.color = "blue";
                    msg.innerText = "Đang tải album ảnh phụ...";


                    for (let i = 1; i < selectedFiles.length; i++) {
                        const imgData = {
                            propertyId: bds.id,
                            imageUrl: await toBase64(selectedFiles[i])
                        };
                        await fetch('/api/PropertyImage', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(imgData)
                        });
                    }

                    msg.style.color = "green";
                    msg.innerText = "Thành công! Hệ thống đã lưu tin đăng và album ảnh.";
                    setTimeout(() => window.location.href = "index.html", 2000);
                }
            } catch (err) {
                msg.style.color = "red"; msg.innerText = "Lỗi kết nối máy chủ!";
                btn.disabled = false;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    </script>
</body>
</html>
